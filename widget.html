<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Physics Tutor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c0f14;
      --surface: #151a23;
      --surface-2: #1c2330;
      --surface-3: #252d3d;
      --border: rgba(255, 255, 255, 0.08);
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #6366f1;
      --accent-2: #818cf8;
      --accent-glow: rgba(99, 102, 241, 0.35);
      --user-bubble: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
      --bot-bubble: #1e2533;
      --success: #22c55e;
      --danger: #f87171;
      --radius-xl: 20px;
      --radius-lg: 14px;
      --radius-md: 10px;
      --shadow: 0 24px 48px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255,255,255,0.04);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(99, 102, 241, 0.18), transparent),
        radial-gradient(ellipse 50% 40% at 100% 100%, rgba(56, 189, 248, 0.08), transparent),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      width: min(480px, 100%);
      height: min(780px, 94vh);
      background: var(--surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    /* Header */
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 18px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      flex-shrink: 0;
    }

    .avatar.bot {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      box-shadow: 0 4px 14px var(--accent-glow);
    }

    .avatar.user {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      font-size: 0.7rem;
      font-weight: 700;
      color: white;
    }

    .topbar-info { flex: 1; min-width: 0; }
    .topbar-info h1 {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .topbar-info p {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
    }

    .badge {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      background: rgba(99, 102, 241, 0.15);
      color: var(--accent-2);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
    }

    .status-text { font-size: 0.72rem; color: var(--text-muted); }

    .icon-btn {
      width: 38px;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface-3);
      color: var(--text-muted);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    .icon-btn:hover:not(:disabled) {
      color: var(--text);
      border-color: rgba(99, 102, 241, 0.4);
      background: rgba(99, 102, 241, 0.1);
    }

    .icon-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .icon-btn svg { width: 18px; height: 18px; }

    /* Settings panel */
    .settings-panel {
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.3s ease, opacity 0.2s ease, padding 0.3s ease;
      padding: 0 18px;
    }

    .settings-panel.open {
      max-height: 160px;
      opacity: 1;
      padding: 14px 18px;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      font-size: 0.75rem;
    }

    .settings-grid label {
      display: flex;
      flex-direction: column;
      gap: 5px;
      color: var(--text-muted);
    }

    .settings-grid select,
    .settings-grid input[type="range"] {
      accent-color: var(--accent);
    }

    .settings-grid select {
      padding: 7px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font: inherit;
      font-size: 0.72rem;
    }

    .toggle-row {
      grid-column: 1 / -1;
      flex-direction: row !important;
      align-items: center;
      gap: 8px !important;
      cursor: pointer;
    }

    /* STT banner */
    .stt-banner {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      background: rgba(99, 102, 241, 0.12);
      border-bottom: 1px solid rgba(99, 102, 241, 0.2);
      font-size: 0.78rem;
      color: var(--accent-2);
    }

    .stt-banner.visible { display: flex; }

    .stt-pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-2);
      animation: pulse 1.2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    /* Messages */
    .chat-area {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-thumb {
      background: var(--surface-3);
      border-radius: 4px;
    }

    .msg-row {
      display: flex;
      gap: 10px;
      max-width: 92%;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-row.student {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-row.assistant { align-self: flex-start; }
    .msg-row.system {
      align-self: center;
      max-width: 100%;
    }

    .msg-body { display: flex; flex-direction: column; gap: 6px; min-width: 0; }

    .msg-row.student .msg-body { align-items: flex-end; }
    .msg-row.assistant .msg-body { align-items: flex-start; }

    .msg-label {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0 4px;
    }

    .msg {
      padding: 12px 16px;
      border-radius: var(--radius-lg);
      font-size: 0.875rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-row.student .msg {
      background: var(--user-bubble);
      color: white;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.25);
    }

    .msg-row.assistant .msg {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg-row.system .msg {
      background: transparent;
      color: var(--text-muted);
      font-size: 0.8rem;
      text-align: center;
      padding: 8px;
    }

    .msg-actions { display: flex; gap: 6px; }

    .msg-actions button {
      font: inherit;
      font-size: 0.7rem;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface-3);
      color: var(--text-muted);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: all 0.15s;
    }

    .msg-actions button:hover {
      color: var(--accent-2);
      border-color: rgba(99, 102, 241, 0.35);
    }

    /* Typing */
    .typing-bar {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 8px 18px 12px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .typing-bar.visible { display: flex; }

    .typing-dots {
      display: flex;
      gap: 4px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-2);
      animation: bounce 1.2s ease infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* Composer */
    .composer {
      padding: 14px 16px 16px;
      background: var(--surface-2);
      border-top: 1px solid var(--border);
    }

    .composer-box {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 6px 6px 6px 8px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .composer-box:focus-within {
      border-color: rgba(99, 102, 241, 0.5);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
    }

    .composer textarea {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 0.875rem;
      resize: none;
      min-height: 40px;
      max-height: 120px;
      padding: 8px 4px;
      line-height: 1.45;
    }

    .composer textarea:focus { outline: none; }
    .composer textarea::placeholder { color: #64748b; }

    .composer-actions {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .btn-mic, .btn-send {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .btn-mic {
      background: transparent;
      color: var(--text-muted);
    }

    .btn-mic:hover:not(:disabled) {
      background: var(--surface-3);
      color: var(--text);
    }

    .btn-mic.active {
      background: rgba(239, 68, 68, 0.15);
      color: var(--danger);
    }

    .btn-send {
      background: var(--accent);
      color: white;
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    .btn-send:hover:not(:disabled) {
      background: var(--accent-2);
      transform: translateY(-1px);
    }

    .btn-mic svg, .btn-send svg { width: 18px; height: 18px; }

    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

    .composer-hint {
      margin-top: 8px;
      font-size: 0.7rem;
      color: #64748b;
      text-align: center;
    }

    .lang-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .lang-bar label {
      font-size: 0.72rem;
      color: #94a3b8;
      white-space: nowrap;
    }

    .lang-toggle {
      display: inline-flex;
      padding: 3px;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.15);
    }

    .lang-btn {
      border: none;
      background: transparent;
      color: #94a3b8;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .lang-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px var(--accent-glow);
    }

    .lang-btn:hover:not(.active) {
      color: #e2e8f0;
    }
  </style>
</head>
<body>
  <div class="app" id="tutor-widget">
    <header class="topbar">
      <div class="avatar bot" aria-hidden="true">⚛</div>
      <div class="topbar-info">
        <h1 id="book-title">Physics Tutor</h1>
        <p id="subtitle">Loading your textbook...</p>
        <div class="status-row">
          <span class="badge" id="scope-badge">Class 9</span>
          <span class="status-dot"></span>
          <span class="status-text">Online</span>
        </div>
      </div>
      <button type="button" class="icon-btn" id="settings-btn" title="Voice settings" aria-label="Voice settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </header>

    <div class="settings-panel" id="settings-panel">
      <div class="settings-grid">
        <label class="toggle-row">
          <input type="checkbox" id="auto-tts" checked />
          Read replies aloud
        </label>
        <label>
          Speed
          <input type="range" id="speech-rate" min="0.7" max="1.3" step="0.1" value="0.9" />
        </label>
        <label class="toggle-row" style="grid-column:1/-1">
          <button type="button" class="icon-btn stop" id="stop-speech-btn" disabled title="Stop speaking" style="width:auto;padding:0 12px;gap:6px;font-size:0.75rem">
            <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
            Stop audio
          </button>
        </label>
      </div>
    </div>

    <div class="stt-banner" id="stt-live">
      <span class="stt-pulse"></span>
      <span id="stt-text">Listening...</span>
    </div>

    <div class="chat-area">
      <div class="messages" id="messages">
        <div class="msg-row system">
          <div class="msg-body">
            <div class="msg">Connecting to your tutor...</div>
          </div>
        </div>
      </div>
      <div class="typing-bar" id="typing">
        <div class="avatar bot" style="width:28px;height:28px;font-size:0.85rem;border-radius:8px">⚛</div>
        <div class="typing-dots"><span></span><span></span><span></span></div>
        <span>Tutor is thinking...</span>
      </div>
    </div>

    <footer class="composer">
      <div class="lang-bar">
        <label>Input language</label>
        <div class="lang-toggle" role="group" aria-label="Input language">
          <button type="button" class="lang-btn active" id="lang-ur" data-lang="ur">اردو</button>
          <button type="button" class="lang-btn" id="lang-en" data-lang="en">English</button>
        </div>
      </div>
      <div class="composer-box">
        <textarea id="input" rows="1" dir="auto" placeholder="اردو یا English میں لکھیں..." disabled></textarea>
        <div class="composer-actions">
          <button type="button" class="btn-mic" id="mic-btn" disabled title="Voice input" aria-label="Voice input">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
          <button type="button" class="btn-send" id="send" disabled title="Send" aria-label="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2" fill="currentColor" stroke="none"/></svg>
          </button>
        </div>
      </div>
      <p class="composer-hint" id="composer-hint">اردو منتخب ہے — مائک سے اردو میں بولیں</p>
    </footer>
  </div>

  <script>
    const API_BASE = window.TUTOR_API_BASE || "";

    const els = {
      messages: document.getElementById("messages"),
      input: document.getElementById("input"),
      send: document.getElementById("send"),
      typing: document.getElementById("typing"),
      bookTitle: document.getElementById("book-title"),
      subtitle: document.getElementById("subtitle"),
      badge: document.getElementById("scope-badge"),
      micBtn: document.getElementById("mic-btn"),
      stopSpeechBtn: document.getElementById("stop-speech-btn"),
      autoTts: document.getElementById("auto-tts"),
      speechRate: document.getElementById("speech-rate"),
      sttLive: document.getElementById("stt-live"),
      sttText: document.getElementById("stt-text"),
      settingsBtn: document.getElementById("settings-btn"),
      settingsPanel: document.getElementById("settings-panel"),
      langUr: document.getElementById("lang-ur"),
      langEn: document.getElementById("lang-en"),
      composerHint: document.getElementById("composer-hint"),
    };

    let sessionId = null;
    let busy = false;
    let listening = false;
    let recognition = null;
    let voiceEngine = "browser"; // "server" | "browser"
    let serverTtsSupported = false;
    let sttLanguage = "ur";
    let inputLanguage = "ur";
    let speechVoices = [];
    let mediaRecorder = null;
    let mediaStream = null;
    let audioChunks = [];
    let wavContext = null;
    let wavSource = null;
    let wavProcessor = null;
    let wavBuffers = [];
    let recordingActive = false;
    let silenceFrame = null;
    let stopSilenceDetector = null;
    let currentAudio = null;
    let currentAudioSource = null;
    let audioCtx = null;
    let speakSeq = 0;

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const browserTtsSupported = "speechSynthesis" in window;
    const browserSttSupported = !!SpeechRecognition;
    let ttsSupported = browserTtsSupported;
    let sttSupported = browserSttSupported;
    const systemLang = navigator.language || "";

    const MIC_COUNTDOWN_MS = 1000;
    const SILENCE_STOP_MS = 3800;
    const MIN_RECORD_MS = 2000;
    const RECORD_WARMUP_MS = 600;

    let micStartTimer = null;
    let micCountdownTimer = null;
    let silenceTimer = null;
    let micBaseText = "";
    let micSessionText = "";
    let micSessionActive = false;
    let recordStartedAt = 0;

    els.settingsBtn.addEventListener("click", () => {
      els.settingsPanel.classList.toggle("open");
    });

    function setSttText(text) {
      els.sttText.textContent = text;
    }

    function loadVoiceSettings() {
      const saved = JSON.parse(localStorage.getItem("tutorVoice") || "{}");
      if (saved.autoTts !== undefined) els.autoTts.checked = saved.autoTts;
      if (saved.rate) els.speechRate.value = saved.rate;
      if (saved.inputLanguage === "en" || saved.inputLanguage === "ur") {
        setInputLanguage(saved.inputLanguage, false);
      } else {
        setInputLanguage("ur", false);
      }
    }

    function saveVoiceSettings() {
      localStorage.setItem("tutorVoice", JSON.stringify({
        autoTts: els.autoTts.checked,
        rate: els.speechRate.value,
        inputLanguage,
      }));
    }

    function setInputLanguage(lang, persist = true) {
      inputLanguage = lang === "en" ? "en" : "ur";
      sttLanguage = inputLanguage;
      els.langUr.classList.toggle("active", inputLanguage === "ur");
      els.langEn.classList.toggle("active", inputLanguage === "en");
      if (inputLanguage === "ur") {
        els.input.placeholder = "اردو میں لکھیں یا مائک استعمال کریں...";
        els.input.setAttribute("dir", "rtl");
        els.composerHint.textContent = "اردو منتخب ہے — مائک سے اردو میں بولیں";
      } else {
        els.input.placeholder = "Type or speak in English...";
        els.input.setAttribute("dir", "ltr");
        els.composerHint.textContent = "English selected — speak in English using the mic";
      }
      if (recognition) {
        recognition.lang = inputLanguage === "ur" ? "ur-PK" : "en-US";
      }
      if (voiceEngine === "server" && sttSupported) {
        els.micBtn.title = inputLanguage === "ur" ? "Voice input (Urdu)" : "Voice input (English)";
      }
      if (persist) saveVoiceSettings();
    }

    els.langUr.addEventListener("click", () => setInputLanguage("ur"));
    els.langEn.addEventListener("click", () => setInputLanguage("en"));

    function textForSpeech(raw) {
      if (!raw) return "";
      return raw
        .replace(/\$\$[^$]+\$\$/g, " ")
        .replace(/\$([^$]+)\$/g, "$1")
        .replace(/\s+/g, " ")
        .trim();
    }

    const URDU_LATIN_HINT =
      /\b(aap|ap|main|mein|mera|meri|tum|hai|hain|ho|hoon|hun|ko|ki|ke|ka|se|par|yeh|ye|woh|wo|bohat|bahut|acha|achha|beta|samjh|samajh|nahi|nahin|kya|kyun|kyon|sir|jee|theek|bilkul|shabaash|muje|mujhe|aapko|hum|aur|lekin|magar|agar|jab|tab|karo|karein|sakti|sakta|dena|lena|karna|hona|maqsad|misaal|misal|mushkil|fahm|ratta|beta)\b/i;

    function isUrduSegment(text) {
      const chunk = text.trim();
      if (!chunk) return false;
      if (/[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF]/.test(chunk)) return true;
      if (!/[A-Za-z]/.test(chunk)) return false;
      return URDU_LATIN_HINT.test(chunk);
    }

    function buildSpeechSegments(text) {
      const sentences = text.split(/(?<=[.!?؟۔])\s+|\n+/).map((s) => s.trim()).filter(Boolean);
      const segments = [];
      for (const sentence of sentences) {
        const lang = isUrduSegment(sentence) ? "ur-PK" : "en-US";
        const last = segments[segments.length - 1];
        if (last && last.lang === lang) last.text += ` ${sentence}`;
        else segments.push({ text: sentence, lang });
      }
      return segments.length ? segments : [{ text, lang: isUrduSegment(text) ? "ur-PK" : "en-US" }];
    }

    function refreshSpeechVoices() {
      speechVoices = window.speechSynthesis.getVoices();
    }

    function pickSpeechVoice(lang) {
      const voices = speechVoices.length ? speechVoices : window.speechSynthesis.getVoices();
      const prefs = lang.startsWith("ur")
        ? ["ur-PK", "ur-IN", "hi-IN"]
        : ["en-US", "en-GB", "en"];
      for (const code of prefs) {
        const voice = voices.find((v) => v.lang === code || v.lang.startsWith(code));
        if (voice) return voice;
      }
      return voices.find((v) => v.lang.startsWith(lang.split("-")[0])) || null;
    }

    /** One consistent Chromium voice for fallback (avoids male/female switching). */
    function pickSingleBrowserVoice() {
      const voices = speechVoices.length ? speechVoices : window.speechSynthesis.getVoices();
      const urVoice =
        voices.find((v) => v.lang === "ur-PK") ||
        voices.find((v) => v.lang.startsWith("ur")) ||
        voices.find((v) => /urdu/i.test(v.name));
      if (urVoice) return urVoice;
      const systemDefault = voices.find((v) => v.default);
      if (systemDefault) return systemDefault;
      const google = voices.find((v) => /google/i.test(v.name));
      if (google) return google;
      return voices[0] || null;
    }

    function speakWithBrowser(text, options = {}) {
      const seq = options.speakSeq;
      const voice = pickSingleBrowserVoice();
      const rate = parseFloat(els.speechRate.value) || 1;
      const lang = /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF]/.test(text) ? "ur-PK" : "ur-PK";

      window.speechSynthesis.cancel();
      if (options.fallback) {
        console.info("Chromium speechSynthesis fallback:", options.fallback);
      }

      const sentences = text
        .split(/(?<=[.!?؟۔])\s+|\n+/)
        .map((s) => s.trim())
        .filter(Boolean);
      const chunks = sentences.length ? sentences : [text];
      let index = 0;

      const speakNext = () => {
        if (seq !== undefined && seq !== speakSeq) return;
        if (index >= chunks.length) {
          els.stopSpeechBtn.classList.remove("active");
          return;
        }
        const utter = new SpeechSynthesisUtterance(chunks[index++]);
        utter.lang = lang;
        utter.rate = rate;
        if (voice) utter.voice = voice;
        utter.onend = speakNext;
        utter.onerror = speakNext;
        window.speechSynthesis.speak(utter);
      };

      speakNext();
    }

    function stopCurrentAudio() {
      if (currentAudioSource) {
        try {
          currentAudioSource.onended = null;
          currentAudioSource.stop(0);
        } catch (_) {}
        try {
          currentAudioSource.disconnect();
        } catch (_) {}
        currentAudioSource = null;
      }
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.onended = null;
        currentAudio.onerror = null;
        currentAudio.src = "";
        currentAudio = null;
      }
    }

    function getAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    /** Play TTS via Web Audio — IDM is less likely to hijack than <audio src=blob>. */
    async function playServerAudioBlob(blob, { isCurrent, onEnded, onError }) {
      const ctx = getAudioContext();
      if (ctx.state === "suspended") {
        await ctx.resume();
      }
      const raw = await blob.arrayBuffer();
      if (!isCurrent()) return false;
      let audioBuffer;
      try {
        audioBuffer = await ctx.decodeAudioData(raw.slice(0));
      } catch (decodeErr) {
        onError(decodeErr);
        return false;
      }
      if (!isCurrent()) return false;
      const source = ctx.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(ctx.destination);
      currentAudioSource = source;
      source.onended = () => {
        if (currentAudioSource === source) currentAudioSource = null;
        onEnded();
      };
      source.start(0);
      return true;
    }

    async function playServerAudioElement(blob, { isCurrent, onEnded, onError }) {
      const url = URL.createObjectURL(blob);
      currentAudio = new Audio(url);
      currentAudio.onended = () => {
        URL.revokeObjectURL(url);
        currentAudio = null;
        onEnded();
      };
      currentAudio.onerror = () => {
        URL.revokeObjectURL(url);
        currentAudio = null;
        onError(new Error("audio-element-error"));
      };
      try {
        await currentAudio.play();
        return true;
      } catch (playErr) {
        URL.revokeObjectURL(url);
        currentAudio = null;
        onError(playErr);
        return false;
      }
    }

    async function speak(text, options = {}) {
      const cleaned = textForSpeech(text);
      if (!cleaned) return;
      const browserText = textForSpeech(options.displayText || text);

      stopCurrentAudio();
      if (browserTtsSupported) window.speechSynthesis.cancel();
      const seq = ++speakSeq;
      const isCurrent = () => seq === speakSeq;

      els.stopSpeechBtn.classList.add("active");
      els.stopSpeechBtn.disabled = false;

      const finishPlayback = () => {
        if (!isCurrent()) return;
        els.stopSpeechBtn.classList.remove("active");
      };

      const useBrowserFallback = (reason) => {
        if (!isCurrent()) return;
        if (!browserTtsSupported) {
          els.stopSpeechBtn.classList.remove("active");
          return;
        }
        speakWithBrowser(browserText, { fallback: reason, speakSeq: seq });
      };

      if (serverTtsSupported) {
        try {
          const res = await fetch(`${API_BASE}/api/voice/synthesize`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              text: cleaned,
              speed: parseFloat(els.speechRate.value) || 1,
              speech_ready: !!options.speechReady,
            }),
          });
          if (!isCurrent()) return;
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.detail || `TTS failed (${res.status})`);
          }
          const blob = await res.blob();
          if (!isCurrent() || !blob.size) return;

          const playbackOpts = {
            isCurrent,
            onEnded: finishPlayback,
            onError: () => useBrowserFallback("server-audio-playback"),
          };

          const viaWebAudio = await playServerAudioBlob(blob, playbackOpts);
          if (!viaWebAudio && isCurrent()) {
            await playServerAudioElement(blob, playbackOpts);
          }
          return;
        } catch (err) {
          if (!isCurrent()) return;
          console.warn("Edge TTS failed, falling back to Chromium:", err);
          useBrowserFallback(err?.message || "edge-request-failed");
          return;
        }
      }

      useBrowserFallback("server-tts-unavailable");
    }

    function stopSpeaking() {
      speakSeq += 1;
      stopCurrentAudio();
      if (browserTtsSupported) window.speechSynthesis.cancel();
      els.stopSpeechBtn.classList.remove("active");
    }

    function mergeFloat32(chunks) {
      const total = chunks.reduce((sum, chunk) => sum + chunk.length, 0);
      const merged = new Float32Array(total);
      let offset = 0;
      for (const chunk of chunks) {
        merged.set(chunk, offset);
        offset += chunk.length;
      }
      return merged;
    }

    function floatTo16BitPCM(float32) {
      const out = new Int16Array(float32.length);
      for (let i = 0; i < float32.length; i++) {
        const sample = Math.max(-1, Math.min(1, float32[i]));
        out[i] = sample < 0 ? sample * 0x8000 : sample * 0x7fff;
      }
      return out;
    }

    function buildWavBlob(float32Samples, sampleRate) {
      const pcm = floatTo16BitPCM(float32Samples);
      const dataBytes = pcm.length * 2;
      const buffer = new ArrayBuffer(44 + dataBytes);
      const view = new DataView(buffer);
      const writeStr = (offset, str) => {
        for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
      };
      writeStr(0, "RIFF");
      view.setUint32(4, 36 + dataBytes, true);
      writeStr(8, "WAVE");
      writeStr(12, "fmt ");
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeStr(36, "data");
      view.setUint32(40, dataBytes, true);
      let offset = 44;
      for (let i = 0; i < pcm.length; i++, offset += 2) {
        view.setInt16(offset, pcm[i], true);
      }
      return new Blob([buffer], { type: "audio/wav" });
    }

    function cleanupWavCapture() {
      recordingActive = false;
      if (wavProcessor) {
        try { wavProcessor.disconnect(); } catch {}
        wavProcessor.onaudioprocess = null;
        wavProcessor = null;
      }
      if (wavSource) {
        try { wavSource.disconnect(); } catch {}
        wavSource = null;
      }
      if (wavContext) {
        wavContext.close().catch(() => {});
        wavContext = null;
      }
      wavBuffers = [];
    }

    function cleanupMedia() {
      if (stopSilenceDetector) {
        stopSilenceDetector();
        stopSilenceDetector = null;
      }
      if (silenceFrame) {
        cancelAnimationFrame(silenceFrame);
        silenceFrame = null;
      }
      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        try { mediaRecorder.stop(); } catch {}
      }
      mediaRecorder = null;
      cleanupWavCapture();
      if (mediaStream) {
        mediaStream.getTracks().forEach((track) => track.stop());
        mediaStream = null;
      }
      audioChunks = [];
    }

    function createSilenceDetector(stream, onSilence) {
      const ctx = new AudioContext();
      const source = ctx.createMediaStreamSource(stream);
      const analyser = ctx.createAnalyser();
      analyser.fftSize = 2048;
      source.connect(analyser);
      const data = new Uint8Array(analyser.fftSize);
      let silentSince = null;

      const check = () => {
        analyser.getByteTimeDomainData(data);
        let sum = 0;
        for (let i = 0; i < data.length; i++) {
          const sample = (data[i] - 128) / 128;
          sum += sample * sample;
        }
        const rms = Math.sqrt(sum / data.length);
        const speaking = rms > 0.012;

        if (!speaking) {
          if (recordStartedAt) {
            const elapsed = Date.now() - recordStartedAt;
            if (elapsed < RECORD_WARMUP_MS || elapsed < MIN_RECORD_MS) {
              silenceFrame = requestAnimationFrame(check);
              return;
            }
          }
          if (!silentSince) silentSince = Date.now();
          else if (Date.now() - silentSince > SILENCE_STOP_MS) {
            onSilence();
            return;
          }
        } else {
          silentSince = null;
        }
        silenceFrame = requestAnimationFrame(check);
      };
      check();
      return () => {
        if (silenceFrame) cancelAnimationFrame(silenceFrame);
        ctx.close().catch(() => {});
      };
    }

    function stopServerRecording() {
      if (!recordingActive && (!mediaRecorder || mediaRecorder.state !== "recording")) return;
      const elapsed = recordStartedAt ? Date.now() - recordStartedAt : MIN_RECORD_MS;
      if (elapsed < MIN_RECORD_MS) {
        setSttText(`Keep speaking... ${Math.ceil((MIN_RECORD_MS - elapsed) / 1000)}s more`);
        return;
      }
      setSttText("Processing...");
      recordingActive = false;

      if (wavProcessor) {
        setTimeout(() => finishWavRecording(), 200);
        return;
      }
      setTimeout(() => {
        if (mediaRecorder?.state === "recording") {
          try { mediaRecorder.requestData(); } catch {}
          mediaRecorder.stop();
        }
      }, 200);
    }

    async function finishWavRecording() {
      const sampleRate = wavContext?.sampleRate || 48000;
      const merged = mergeFloat32(wavBuffers);
      const durationSec = merged.length / sampleRate;
      const blob = buildWavBlob(merged, sampleRate);

      if (mediaStream) {
        mediaStream.getTracks().forEach((track) => track.stop());
        mediaStream = null;
      }
      cleanupWavCapture();
      listening = false;
      els.micBtn.classList.remove("active");

      if (durationSec < 0.4 || blob.size < 5000) {
        setSttText("Recording too short — speak 2+ seconds and try again");
        micSessionActive = false;
        setTimeout(() => els.sttLive.classList.remove("visible"), 2500);
        return;
      }

      setSttText("Processing...");
      try {
        const result = await transcribeBlob(blob, "recording.wav");
        micSessionText = (result.text || "").trim();
        if (!micSessionText) {
          setSttText("Couldn't understand — try again, speak clearly");
          micSessionActive = false;
          setTimeout(() => els.sttLive.classList.remove("visible"), 2500);
          return;
        }
        finalizeMicSession();
      } catch (err) {
        setSttText(`Mic error: ${err.message}`);
        micSessionActive = false;
        micSessionText = "";
        setTimeout(() => els.sttLive.classList.remove("visible"), 2500);
      }
    }

    async function transcribeBlob(blob, filename = "recording.wav") {
      const form = new FormData();
      form.append("audio", blob, filename);
      form.append("language", inputLanguage);
      form.append("output", inputLanguage === "ur" ? "urdu" : "english");
      const res = await fetch(`${API_BASE}/api/voice/transcribe`, {
        method: "POST",
        body: form,
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `Transcription failed (${res.status})`);
      }
      return res.json();
    }

    async function startServerRecording() {
      setSttText("Opening mic...");
      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          channelCount: 1,
          echoCancellation: true,
          noiseSuppression: false,
          autoGainControl: true,
        },
      });

      wavBuffers = [];
      wavContext = new AudioContext();
      await wavContext.resume();
      wavSource = wavContext.createMediaStreamSource(mediaStream);
      wavProcessor = wavContext.createScriptProcessor(4096, 1, 1);
      wavProcessor.onaudioprocess = (event) => {
        if (!recordingActive) return;
        wavBuffers.push(new Float32Array(event.inputBuffer.getChannelData(0)));
      };
      wavSource.connect(wavProcessor);
      wavProcessor.connect(wavContext.destination);

      recordStartedAt = Date.now();
      recordingActive = true;
      listening = true;
      els.micBtn.classList.add("active");
      els.sttLive.classList.add("visible");
      setSttText("Recording — speak your full question");

      stopSilenceDetector = createSilenceDetector(mediaStream, () => {
        stopServerRecording();
      });
    }

    function cancelMicStart() {
      if (micStartTimer) { clearTimeout(micStartTimer); micStartTimer = null; }
      if (micCountdownTimer) { clearInterval(micCountdownTimer); micCountdownTimer = null; }
      els.micBtn.classList.remove("active");
      els.sttLive.classList.remove("visible");
    }

    function rebuildTranscript(results) {
      let text = "";
      for (let i = 0; i < results.length; i++) text += results[i][0].transcript;
      return text.trim();
    }

    function clearSilenceTimer() {
      if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
    }

    function scheduleSilenceStop() {
      clearSilenceTimer();
      silenceTimer = setTimeout(() => {
        if (micSessionActive && recognition) {
          setSttText("Processing...");
          recognition.stop();
        }
      }, SILENCE_STOP_MS);
    }

    function stopMicEarly() {
      clearSilenceTimer();
      if (voiceEngine === "server") {
        stopServerRecording();
        return;
      }
      if (recognition && (listening || micSessionActive)) recognition.stop();
    }

    function updateMicPreview() {
      const heard = micSessionText.trim();
      const preview = micBaseText ? `${micBaseText} ${heard}`.trim() : heard;
      if (preview) els.input.value = preview;
    }

    function finalizeMicSession() {
      const heard = micSessionText.trim();
      if (heard) els.input.value = micBaseText ? `${micBaseText} ${heard}` : heard;
      micBaseText = "";
      micSessionText = "";
      micSessionActive = false;
      listening = false;
      clearSilenceTimer();
      els.micBtn.classList.remove("active");
      els.sttLive.classList.remove("visible");
    }

    function initSTT() {
      if (voiceEngine === "server") {
        if (navigator.mediaDevices?.getUserMedia) {
          els.micBtn.disabled = false;
        } else {
          els.micBtn.title = "Microphone not supported";
        }
        return;
      }
      if (!browserSttSupported) { els.micBtn.title = "Voice input not supported"; return; }
      els.micBtn.disabled = false;
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.lang = inputLanguage === "ur" ? "ur-PK" : "en-US";

      recognition.onstart = () => {
        listening = true;
        els.micBtn.classList.add("active");
        els.sttLive.classList.add("visible");
        setSttText("Speak now...");
      };

      recognition.onaudiostart = () => { clearSilenceTimer(); setSttText("Listening..."); };
      recognition.onspeechstart = () => { clearSilenceTimer(); setSttText("Listening..."); };
      recognition.onspeechend = () => { setSttText("Pausing..."); scheduleSilenceStop(); };

      recognition.onend = () => {
        listening = false;
        clearSilenceTimer();
        if (!micSessionActive) return;
        micSessionActive = false;
        finalizeMicSession();
      };

      recognition.onerror = (e) => {
        if (e.error === "aborted") return;
        if (e.error === "no-speech") { micSessionActive = false; finalizeMicSession(); return; }
        els.sttLive.classList.add("visible");
        setSttText(`Mic error: ${e.error}`);
        setTimeout(() => els.sttLive.classList.remove("visible"), 2500);
      };

      recognition.onresult = (e) => {
        const latest = rebuildTranscript(e.results);
        if (latest) micSessionText = latest;
        updateMicPreview();
        clearSilenceTimer();
        const last = e.results[e.results.length - 1];
        if (last?.isFinal) scheduleSilenceStop();
        else setSttText(`Hearing: ${micSessionText}`);
      };
    }

    function startMicCountdown(onDone) {
      let remaining = MIC_COUNTDOWN_MS;
      setSttText("Get ready...");
      micCountdownTimer = setInterval(() => {
        remaining -= 400;
        if (remaining > 800) setSttText("Starting in 3...");
        else if (remaining > 400) setSttText("Starting in 2...");
        else if (remaining > 0) setSttText("Starting in 1...");
        else {
          clearInterval(micCountdownTimer);
          micCountdownTimer = null;
          setSttText("SPEAK NOW");
          onDone();
        }
      }, 400);
    }

    function toggleMic() {
      if (busy) return;
      if (micStartTimer || micCountdownTimer) { cancelMicStart(); micSessionActive = false; cleanupMedia(); return; }
      if (listening || micSessionActive) {
        if (voiceEngine === "server" && (recordingActive || mediaRecorder?.state === "recording")) {
          stopServerRecording();
        } else {
          stopMicEarly();
        }
        return;
      }

      stopSpeaking();
      micBaseText = els.input.value.trim();
      micSessionText = "";
      micSessionActive = true;
      els.micBtn.classList.add("active");
      els.sttLive.classList.add("visible");

      if (voiceEngine === "server") {
        startServerRecording().catch((err) => {
          setSttText(`Mic error: ${err.message}`);
          micSessionActive = false;
          cleanupMedia();
          setTimeout(() => els.sttLive.classList.remove("visible"), 2500);
        });
        return;
      }

      startMicCountdown(async () => {
        micStartTimer = setTimeout(async () => {
          micStartTimer = null;
          try { recognition.start(); }
          catch {
            recognition.stop();
            setTimeout(() => { try { recognition.start(); } catch { finalizeMicSession(); } }, 200);
          }
        }, 200);
      });
    }

    function addMessage(role, text, options = {}) {
      const speechText = options.speechText || text;
      const speechReady = !!options.speechText;
      const row = document.createElement("div");
      row.className = `msg-row ${role}`;

      if (role !== "system") {
        const av = document.createElement("div");
        av.className = `avatar ${role === "student" ? "user" : "bot"}`;
        av.textContent = role === "student" ? "You" : "⚛";
        av.setAttribute("aria-hidden", "true");
        row.appendChild(av);
      }

      const body = document.createElement("div");
      body.className = "msg-body";

      if (role !== "system") {
        const label = document.createElement("span");
        label.className = "msg-label";
        label.textContent = role === "student" ? "You" : "Tutor";
        body.appendChild(label);
      }

      const bubble = document.createElement("div");
      bubble.className = "msg";
      bubble.textContent = text;
      if (options.speechText) bubble.dataset.speechText = options.speechText;
      body.appendChild(bubble);

      if (role === "assistant" && ttsSupported) {
        const actions = document.createElement("div");
        actions.className = "msg-actions";
        const listenBtn = document.createElement("button");
        listenBtn.type = "button";
        listenBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg> Listen';
        listenBtn.addEventListener("click", () =>
          speak(speechText, { speechReady, displayText: text })
        );
        actions.appendChild(listenBtn);
        body.appendChild(actions);
      }

      row.appendChild(body);
      els.messages.appendChild(row);
      els.messages.scrollTop = els.messages.scrollHeight;

      if (role === "assistant" && options.speak && els.autoTts.checked) {
        speak(speechText, { speechReady, displayText: text });
      }
      return row;
    }

    function clearSystemMessages() {
      els.messages.querySelectorAll(".msg-row.system").forEach((n) => n.remove());
    }

    function setBusy(on) {
      busy = on;
      els.send.disabled = on || !sessionId;
      els.input.disabled = on || !sessionId;
      if (on && (listening || micSessionActive)) stopMicEarly();
      if (on) {
        cancelMicStart();
        cleanupMedia();
      }
      els.micBtn.disabled = on || !sessionId || !sttSupported;
      els.typing.classList.toggle("visible", on);
    }

    async function api(path, options = {}) {
      const res = await fetch(`${API_BASE}${path}`, {
        headers: { "Content-Type": "application/json" },
        ...options,
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `Request failed (${res.status})`);
      }
      return res.json();
    }

    async function initVoiceEngine() {
      try {
        const caps = await api("/api/voice/capabilities");
        serverTtsSupported = !!caps.tts;
        if (caps.stt_language) { /* server default; user picker controls language */ }
        if (caps.stt) {
          voiceEngine = "server";
          sttSupported = true;
          els.micBtn.title = inputLanguage === "ur" ? "Voice input (Urdu)" : "Voice input (English)";
        } else {
          voiceEngine = "browser";
          sttSupported = browserSttSupported;
        }
        ttsSupported = serverTtsSupported || browserTtsSupported;
        if (ttsSupported) {
          els.stopSpeechBtn.disabled = false;
          els.autoTts.disabled = false;
        }
        return;
      } catch {}
      voiceEngine = "browser";
      serverTtsSupported = false;
      sttSupported = browserSttSupported;
      ttsSupported = browserTtsSupported;
    }

    async function initSession() {
      const session = await api("/api/sessions", {
        method: "POST",
        body: JSON.stringify({ title: "Widget chat" }),
      });

      sessionId = session.session_id;
      els.bookTitle.textContent = session.book_title;
      els.subtitle.textContent = `${session.subject_name} · step-by-step help`;
      els.badge.textContent = session.class_label;

      clearSystemMessages();
      addMessage(
        "assistant",
        `Assalam-o-Alaikum, beta! Main Ustaad Jee hoon, aapki Miss Physics.\n\n` +
        `Jee bilkul, main aapki ${session.subject_name} mein poori madad kar sakti hoon. ` +
        `"${session.book_title}" se koi bhi topic ya numerical poochiye — Urdu mein likhein ya mic se Urdu mein boliye.`,
        { speak: true }
      );

      els.input.disabled = false;
      els.send.disabled = false;
      if (sttSupported) els.micBtn.disabled = false;
      els.input.focus();
    }

    async function sendMessage() {
      const text = els.input.value.trim();
      if (!text || busy || !sessionId) return;

      stopSpeaking();
      els.input.value = "";
      addMessage("student", text);
      setBusy(true);

      try {
        const data = await api("/api/chat", {
          method: "POST",
          body: JSON.stringify({ session_id: sessionId, message: text }),
        });
        addMessage("assistant", data.reply, {
          speak: true,
          speechText: data.speech_text || null,
        });
      } catch (err) {
        addMessage("system", `Error: ${err.message}`);
      } finally {
        setBusy(false);
        els.input.focus();
      }
    }

    els.send.addEventListener("click", sendMessage);
    els.micBtn.addEventListener("click", toggleMic);
    els.stopSpeechBtn.addEventListener("click", stopSpeaking);
    els.autoTts.addEventListener("change", saveVoiceSettings);
    els.speechRate.addEventListener("input", saveVoiceSettings);

    els.input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    els.input.addEventListener("input", () => {
      els.input.style.height = "auto";
      els.input.style.height = Math.min(els.input.scrollHeight, 120) + "px";
    });

    if (ttsSupported) {
      els.stopSpeechBtn.disabled = false;
    } else {
      els.autoTts.disabled = true;
      els.stopSpeechBtn.disabled = true;
    }

    loadVoiceSettings();
    if (browserTtsSupported) {
      refreshSpeechVoices();
      window.speechSynthesis.addEventListener("voiceschanged", refreshSpeechVoices);
    }

    (async () => {
      try {
        await api("/api/health");
        await initVoiceEngine();
        initSTT();
        await initSession();
      } catch {
        initSTT();
        clearSystemMessages();
        addMessage("system", "Cannot reach tutor API.\nRun: uvicorn src.api.main:app --reload --port 8000");
      }
    })();
  </script>
</body>
</html>
